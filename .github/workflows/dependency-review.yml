name: Dependency Review

# Scans pull requests for dependency changes and flags any that introduce
# known-vulnerable packages, disallowed licences, or newly added modules.
# Runs only on PRs, where the diff of dependencies can be compared against base.

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          # Block the PR when a dependency with a high or critical advisory is added.
          fail-on-severity: high
          # Leave a summary comment on the PR when the check fails.
          comment-summary-in-pr: on-failure
