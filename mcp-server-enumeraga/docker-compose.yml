services:
  enumeraga-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enumeraga-mcp
    environment:
      - MCP_MODE=sse
      - ENUMERAGA_HOST_OUTPUT_DIR=${ENUMERAGA_HOST_OUTPUT_DIR:-/tmp/enumeraga_scan_results}
    volumes:
      # CRITICAL: Mount Docker socket so the MCP server can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Identity mount: the host output path is mounted at the exact same path inside this
      # container so that bind-mount sources handed to sibling `docker run` calls resolve
      # identically on the host daemon and inside this container.
      - ${ENUMERAGA_HOST_OUTPUT_DIR:-/tmp/enumeraga_scan_results}:${ENUMERAGA_HOST_OUTPUT_DIR:-/tmp/enumeraga_scan_results}
    ports:
      # Expose port so existing n8n container can reach it via host network
      - "9000:9000"
    restart: unless-stopped
    # Use host networking mode if possible, otherwise rely on mapped ports
    # network_mode: host
